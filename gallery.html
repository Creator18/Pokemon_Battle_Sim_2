<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Model Gallery — Pokémon Hex Battle</title>
<style>
  html,body{margin:0;height:100%;background:#12121f;overflow:hidden}
  #c{width:100%;height:100%;display:block;touch-action:none}
  #labels{position:fixed;top:10px;left:0;width:100%;display:flex;justify-content:space-around;
    color:#E8E8F0;font-family:system-ui,sans-serif;font-weight:700;pointer-events:none;text-shadow:0 1px 3px #000}
  #hint{position:fixed;bottom:10px;left:0;width:100%;text-align:center;color:#9CA3AF;
    font-family:system-ui,sans-serif;font-size:13px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="labels"></div>
<div id="hint">Model preview — drag to orbit, scroll to zoom. Each model auto-rotates.</div>
<script type="module" src="/src/gallery.ts"></script>
</body>
</html>
